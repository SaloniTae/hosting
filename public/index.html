<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Castoor</title>
<script>
// ✅ Must be defined BEFORE cast_sender.js loads
window['__onGCastApiAvailable'] = function(isAvailable) {
  log(isAvailable ? 'Cast SDK ready ✓' : 'Cast SDK unavailable', isAvailable?'ok':'err');
  if (!isAvailable) {
    setStatus('Cast unavailable — needs Chrome + HTTPS', 'error');
    return;
  }
  initCast();
};
</script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--s:#0f0f1a;--b:#1a1a2e;--b2:#252540;
  --a:#7c6aff;--adim:#7c6aff18;--t:#eeeef8;--m:#7070a0;
  --ok:#22d47e;--err:#ff5e5e;--warn:#f59e0b;
}
html,body{min-height:100dvh;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:480px;margin:0 auto;padding:24px 16px 64px;display:flex;flex-direction:column;gap:14px;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:22px;font-weight:700;letter-spacing:-.04em;}
.brand span{color:var(--a);}

/* Cast trigger button in header */
#cast-trigger{
  display:flex;align-items:center;gap:6px;
  background:var(--s);border:1px solid var(--b);
  border-radius:999px;padding:7px 14px;
  font-size:12px;font-weight:600;color:var(--m);
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
#cast-trigger.ready{border-color:var(--a);color:var(--a);}
#cast-trigger.connected{border-color:var(--ok);color:var(--ok);}
#cast-trigger svg{width:16px;height:16px;flex-shrink:0;}

/* Status */
.status{
  display:flex;align-items:center;gap:10px;
  background:var(--s);border:1px solid var(--b);
  border-radius:999px;padding:9px 16px;
  font-size:12.5px;color:var(--m);transition:all .3s;
}
.status.connected{border-color:var(--ok);color:var(--t);}
.status.casting{border-color:var(--a);background:var(--adim);color:var(--t);}
.status.error{border-color:var(--err);color:var(--err);}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--b2);flex-shrink:0;transition:background .3s;}
.connected .sdot{background:var(--ok);}
.casting .sdot{background:var(--a);animation:pulse 1.2s infinite;}
.error .sdot{background:var(--err);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* Card */
.card{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:18px;}
.ctitle{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--m);margin-bottom:12px;}

/* URL */
textarea#url{
  width:100%;background:var(--bg);border:1px solid var(--b);
  border-radius:10px;padding:11px 13px;font-size:13px;
  font-family:'Courier New',monospace;color:var(--t);
  outline:none;resize:none;height:70px;line-height:1.6;
  transition:border-color .2s;
}
textarea#url:focus{border-color:var(--a);}
textarea#url::placeholder{color:var(--m);}

select#ctype{
  width:100%;background:var(--bg);border:1px solid var(--b);
  border-radius:10px;padding:10px 13px;font-size:13px;color:var(--m);
  outline:none;margin-top:10px;appearance:none;cursor:pointer;
  font-family:system-ui,sans-serif;
}

/* Cast button */
.btn-cast{
  width:100%;padding:15px;
  background:var(--a);color:#fff;
  border:none;border-radius:12px;
  font-size:15px;font-weight:600;
  cursor:pointer;margin-top:12px;
  letter-spacing:-.01em;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  -webkit-tap-highlight-color:transparent;
  font-family:system-ui,sans-serif;
}
.btn-cast:active{transform:scale(.97);opacity:.85;}
.btn-cast:disabled{background:var(--b);color:var(--m);cursor:not-allowed;transform:none;}

/* Presets */
.presets{display:flex;flex-direction:column;gap:8px;}
.preset{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);border:1px solid var(--b);
  border-radius:10px;padding:12px 14px;cursor:pointer;
  transition:all .15s;gap:12px;
  -webkit-tap-highlight-color:transparent;
}
.preset:active,.preset.active{border-color:var(--a);background:var(--adim);}
.pname{font-size:13px;font-weight:500;color:var(--t);}
.ptag{font-size:10px;background:var(--b2);color:var(--m);padding:3px 8px;border-radius:4px;font-family:monospace;flex-shrink:0;}

/* Controls */
.cgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.btn-c{
  padding:12px 8px;background:var(--bg);border:1px solid var(--b);
  border-radius:10px;color:var(--m);font-size:13px;
  cursor:pointer;transition:all .15s;text-align:center;
  -webkit-tap-highlight-color:transparent;
  font-family:system-ui,sans-serif;
}
.btn-c:active{border-color:var(--a);color:var(--t);}
.btn-c.stop:active{border-color:var(--err);color:var(--err);}
.btn-c:disabled{opacity:.3;cursor:not-allowed;}

/* Volume */
.vrow{display:flex;align-items:center;gap:12px;}
.vlbl{font-size:12px;color:var(--m);min-width:52px;}
input[type=range]{flex:1;appearance:none;height:4px;border-radius:4px;background:var(--b2);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:18px;height:18px;border-radius:50%;background:var(--a);cursor:pointer;}
#vval{font-size:12px;color:var(--m);min-width:32px;text-align:right;}

/* Now playing */
#np{display:none;background:var(--s);border:1px solid var(--ok);border-radius:14px;padding:14px 16px;}
#np.show{display:block;}
.nplbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ok);margin-bottom:6px;}
.npurl{font-size:11px;font-family:monospace;color:var(--m);word-break:break-all;line-height:1.5;}

/* Log */
#log{background:var(--bg);border:1px solid var(--b);border-radius:10px;padding:12px 14px;font-size:11px;font-family:monospace;color:var(--m);max-height:130px;overflow-y:auto;line-height:1.9;}
.lt{color:#2a2a45;margin-right:6px;}
.lok{color:var(--ok);} .lerr{color:var(--err);} .linfo{color:var(--a);} .lwarn{color:var(--warn);}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="brand">Cast<span>oor</span></div>
    <button id="cast-trigger" onclick="openCastDialog()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm18-7H5c-1.1 0-2 .9-2 2v3h2v-3h14v10h-5v2h5c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-18 3v2c.93 0 1.78.28 2.5.75l1.45-1.45C3.96 10.5 2.56 10 1 10z"/></svg>
      <span id="cast-trigger-label">Connecting...</span>
    </button>
  </div>

  <div class="status" id="status">
    <div class="sdot"></div>
    <span id="stext">Loading Cast SDK...</span>
  </div>

  <div id="np">
    <div class="nplbl">▶ Now Casting</div>
    <div class="npurl" id="np-url">—</div>
  </div>

  <div class="card">
    <div class="ctitle">Stream URL</div>
    <textarea id="url" placeholder="https://your-server.com/live/stream.m3u8"></textarea>
    <select id="ctype">
      <option value="auto">🔍 Auto-detect type</option>
      <option value="application/x-mpegURL">HLS — .m3u8</option>
      <option value="application/dash+xml">DASH — .mpd</option>
      <option value="video/mp4">MP4</option>
      <option value="audio/mpeg">Audio MP3</option>
    </select>
    <button class="btn-cast" id="btn-cast" disabled onclick="castStream()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm18-7H5c-1.1 0-2 .9-2 2v3h2v-3h14v10h-5v2h5c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-18 3v2c.93 0 1.78.28 2.5.75l1.45-1.45C3.96 10.5 2.56 10 1 10z"/></svg>
      Cast to TV
    </button>
  </div>

  <div class="card">
    <div class="ctitle">Quick Test Streams</div>
    <div class="presets">
      <div class="preset active" data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"><span class="pname">Mux test stream</span><span class="ptag">HLS</span></div>
      <div class="preset" data-url="https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8"><span class="pname">Apple bipbop fMP4</span><span class="ptag">HLS</span></div>
      <div class="preset" data-url="https://storage.googleapis.com/shaka-demo-assets/angel-one/dash.mpd"><span class="pname">Shaka angel-one</span><span class="ptag">DASH</span></div>
      <div class="preset" data-url="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"><span class="pname">Big Buck Bunny</span><span class="ptag">MP4</span></div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle">Playback Controls</div>
    <div class="cgrid">
      <button class="btn-c" id="btn-play" disabled onclick="ctrlPlay()">▶ Play</button>
      <button class="btn-c" id="btn-pause" disabled onclick="ctrlPause()">⏸ Pause</button>
      <button class="btn-c stop" id="btn-stop" disabled onclick="ctrlStop()">■ Stop</button>
    </div>
    <div class="vrow">
      <span class="vlbl">Volume</span>
      <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8" disabled oninput="ctrlVol(this)"/>
      <span id="vval">80%</span>
    </div>
  </div>

  <div id="log"><span class="lt">--:--</span><span class="linfo">Loading Cast SDK...</span></div>

</div>
<script>
// ── Helpers ───────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function log(msg,t='info'){
  const el=$('log'),now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML+=`\n<span class="lt">${now}</span><span class="l${t}">${msg}</span>`;
  el.scrollTop=el.scrollHeight;
}
function setStatus(txt,cls=''){
  $('status').className='status '+cls;
  $('stext').textContent=txt;
}
function setControls(on){
  ['btn-play','btn-pause','btn-stop','vol'].forEach(id=>$(id).disabled=!on);
}
function detectType(url){
  if(url.includes('.m3u8')||url.includes('m3u8')) return 'application/x-mpegURL';
  if(url.includes('.mpd')) return 'application/dash+xml';
  if(url.includes('.mp3')) return 'audio/mpeg';
  return 'video/mp4';
}
function detectStreamType(url){
  if(url.includes('.m3u8')||url.includes('.mpd')) return chrome.cast.media.StreamType.LIVE;
  return chrome.cast.media.StreamType.BUFFERED;
}

// ── Presets ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.preset').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    $('url').value=p.dataset.url;
  });
});
// Pre-fill first preset
$('url').value='https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

// ── Cast Init ─────────────────────────────────────────────────────────────────
function initCast(){
  const ctx=cast.framework.CastContext.getInstance();

  // ✅ DEFAULT_MEDIA_RECEIVER_APP_ID — no $5 registration
  ctx.setOptions({
    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
    resumeSavedSession: true,
  });

  setStatus('Tap "Find TV" to discover Chromecast devices');
  $('cast-trigger').classList.add('ready');
  $('cast-trigger-label').textContent='Find TV';
  log('Ready — tap Find TV button','ok');

  // Session state
  ctx.addEventListener(
    cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
    e=>{
      const S=cast.framework.SessionState;
      const session=ctx.getCurrentSession();
      switch(e.sessionState){
        case S.SESSION_STARTED:
        case S.SESSION_RESUMED:
          const dev=session.getCastDevice().friendlyName;
          log(`Connected: ${dev}`,'ok');
          setStatus(`Connected — ${dev}`,'connected');
          $('cast-trigger').classList.remove('ready');
          $('cast-trigger').classList.add('connected');
          $('cast-trigger-label').textContent=dev;
          $('btn-cast').disabled=false;
          break;
        case S.SESSION_ENDED:
          log('Disconnected','warn');
          setStatus('Tap "Find TV" to connect');
          $('cast-trigger').classList.remove('connected');
          $('cast-trigger').classList.add('ready');
          $('cast-trigger-label').textContent='Find TV';
          $('btn-cast').disabled=true;
          setControls(false);
          $('np').classList.remove('show');
          break;
        case S.NO_SESSION:
          setStatus('Tap "Find TV" to discover devices');
          break;
      }
    }
  );
}

// ── Open cast device picker ───────────────────────────────────────────────────
// ✅ This is the KEY function — uses requestSession directly
// This is what triggers the native Cast device picker on Android Chrome
function openCastDialog(){
  if(typeof cast==='undefined'||typeof chrome.cast==='undefined'){
    log('Cast SDK not ready yet','err');
    return;
  }
  const ctx=cast.framework.CastContext.getInstance();
  const session=ctx.getCurrentSession();

  if(session){
    // Already connected — end session
    session.endSession(true);
    return;
  }

  // ✅ requestSession() triggers the native device picker popup
  ctx.requestSession().then(()=>{
    log('Session started','ok');
  }).catch(err=>{
    if(err===cast.framework.CastContextEventType.SESSION_STATE_CHANGED) return;
    log('Session error: '+err,'warn');
  });
}

// ── Cast stream ───────────────────────────────────────────────────────────────
function castStream(){
  const url=$('url').value.trim();
  if(!url){log('Enter a stream URL','err');return;}

  const session=cast.framework.CastContext.getInstance().getCurrentSession();
  if(!session){log('Not connected — tap Find TV first','err');return;}

  const ctypeVal=$('ctype').value;
  const contentType=ctypeVal==='auto'?detectType(url):ctypeVal;
  const streamType=detectStreamType(url);

  log(`Loading ${url.split('/').pop() || url}...`,'info');

  const mediaInfo=new chrome.cast.media.MediaInfo(url, contentType);
  mediaInfo.streamType=streamType;

  const request=new chrome.cast.media.LoadRequest(mediaInfo);
  request.autoplay=true;

  session.loadMedia(request).then(()=>{
    log('✓ Playing on TV','ok');
    setStatus(`Casting — ${session.getCastDevice().friendlyName}`,'casting');
    setControls(true);
    $('np').classList.add('show');
    $('np-url').textContent=url;
    session.setVolume(parseFloat($('vol').value)).catch(()=>{});
  }).catch(err=>{
    log(`Failed: ${err} — check CORS headers on stream server`,'err');
  });
}

// ── Playback controls ─────────────────────────────────────────────────────────
function ctrlPlay(){
  const m=cast.framework.CastContext.getInstance().getCurrentSession()?.getMediaSession();
  if(m) m.play(null,()=>log('▶ Playing','ok'),e=>log('Error: '+e,'err'));
}
function ctrlPause(){
  const m=cast.framework.CastContext.getInstance().getCurrentSession()?.getMediaSession();
  if(m) m.pause(null,()=>log('⏸ Paused','warn'),e=>log('Error: '+e,'err'));
}
function ctrlStop(){
  const s=cast.framework.CastContext.getInstance().getCurrentSession();
  const m=s?.getMediaSession();
  if(m) m.stop(null,()=>{
    log('■ Stopped','warn');
    setControls(false);
    $('np').classList.remove('show');
    if(s) setStatus(`Connected — ${s.getCastDevice().friendlyName}`,'connected');
  },e=>log('Error: '+e,'err'));
}
function ctrlVol(el){
  const v=parseFloat(el.value);
  $('vval').textContent=Math.round(v*100)+'%';
  cast.framework.CastContext.getInstance().getCurrentSession()?.setVolume(v).catch(()=>{});
}
</script>
</body>
</html>
